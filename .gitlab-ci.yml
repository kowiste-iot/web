github-sync:
  image: alpine:latest
  
  before_script:
    - apk update && apk add git openssh
    - echo "Running as ${GITLAB_USER_NAME}"
    
  script:
    # Configure git
    - git config --global user.name "${GITLAB_USER_NAME}"
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    
    # Debug information
    - echo "Current branch state:"
    - git branch -av
    
    # Make sure we're working with the current state
    - git fetch origin
    - git checkout -f ${CI_COMMIT_SHA}
    
    # Add GitHub remote
    - |
      if ! git remote | grep -q "github"; then
        echo "Adding GitHub remote..."
        git remote add github https://${GITHUB_TOKEN}@github.com/kowiste-iot/web.git
      fi
    
    # Create local public branch
    - git checkout -B public
    
    # Force push to GitHub main branch
    - |
      echo "Pushing to GitHub..."
      if ! git push -f github public:main; then
        echo "Push failed. Debug info:"
        git remote -v
        git branch -av
        exit 1
      fi
    
  rules:
    - if: '$CI_COMMIT_BRANCH == "public"'
      when: always
    - when: never