github-sync:
  image: alpine:latest
  
  before_script:
    - apk update && apk add git openssh
    - echo "Running as ${GITLAB_USER_NAME}"
    
  script:
    # Configure git
    - git config --global user.name "${GITLAB_USER_NAME}"
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    
    # Be explicit about the remote tracking branch
    - git fetch origin public:refs/remotes/origin/public
    
    # Create and checkout the local branch, tracking the remote
    - git checkout -B public --track origin/public
    
    # Add GitHub remote if it doesn't exist
    - |
      if ! git remote | grep -q "github"; then
        git remote add github https://${GITHUB_TOKEN}@github.com/kowiste-iot/web.git
      fi
    
    # Push to GitHub with explicit refspec
    - |
      if ! git push -f github public:main; then
        echo "Failed to push to GitHub. Check your token permissions and organization access."
        exit 1
      fi
  
  rules:
    - if: '$CI_COMMIT_BRANCH == "public"'
      when: always
    - when: never